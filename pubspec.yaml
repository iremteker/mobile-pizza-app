name: pizza_app
description: "Türkçe Pizza Sipariş Uygulaması - Domino's clone"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP İstemcisi
  dio: ^5.4.3
  http: ^1.2.1

  # Yerel Depolama (Token saklama)
  shared_preferences: ^2.2.3

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.3.3
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
